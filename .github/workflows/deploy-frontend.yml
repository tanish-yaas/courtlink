# Optional: deploy the FRONTEND to GitHub Pages.
# Vercel (see README) is the recommended path and needs no workflow.
# Use this only if you prefer hosting the static client on GitHub Pages.
#
# Before enabling: Settings → Pages → Build and deployment → Source: GitHub Actions.
# Set the repo variable VITE_BACKEND_URL (Settings → Secrets and variables →
# Actions → Variables) to your deployed backend URL, e.g. https://courtlink.onrender.com
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          # On project Pages the app is served from /<repo>/ — set the base path.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
